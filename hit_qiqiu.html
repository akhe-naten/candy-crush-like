<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎈 气球爆破消消乐 - Match 3</title>
    <style>
        :root {
            --balloon-red: #FF6B6B;
            --balloon-orange: #FF9F43;
            --balloon-yellow: #FECA57;
            --balloon-green: #2ED573;
            --balloon-blue: #54A0FF;
            --balloon-purple: #C44DFF;
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-board: #0f0f1a;
            --board-size: min(85vw, 500px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #1a1a2e 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(2px 2px at 10% 20%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(2px 2px at 25% 55%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1px 1px at 40% 15%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(2px 2px at 55% 70%, rgba(255, 255, 255, 0.35), transparent),
                radial-gradient(1px 1px at 70% 30%, rgba(255, 255, 255, 0.45), transparent),
                radial-gradient(2px 2px at 85% 60%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1px 1px at 15% 80%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(2px 2px at 60% 10%, rgba(255, 255, 255, 0.35), transparent),
                radial-gradient(1px 1px at 90% 45%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(2px 2px at 35% 90%, rgba(255, 255, 255, 0.4), transparent);
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .game-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px;
        }

        .game-title {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(180deg, #ffd700 0%, #ffaa00 40%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 3px 6px rgba(255, 170, 0, 0.5));
            animation: titleGlow 2s ease-in-out infinite alternate;
            text-align: center;
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 3px 6px rgba(255, 170, 0, 0.4)); }
            100% { filter: drop-shadow(0 3px 14px rgba(255, 200, 0, 0.8)); }
        }

        .score-panel {
            display: flex;
            align-items: center;
            gap: 24px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            flex-wrap: wrap;
            justify-content: center;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .score-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
        }

        .score-value {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transition: transform 0.2s ease;
            min-width: 60px;
            text-align: center;
        }

        .score-value.pop {
            animation: scorePop 0.4s ease-out;
        }

        @keyframes scorePop {
            0% { transform: scale(1); }
            30% { transform: scale(1.35); color: #ffd700; }
            100% { transform: scale(1); }
        }

        .combo-display {
            font-size: 14px;
            font-weight: 700;
            color: #ff6b6b;
            min-height: 20px;
            text-align: center;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .combo-display.active {
            animation: comboShake 0.5s ease-out;
            color: #ff4444;
        }

        @keyframes comboShake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-6px); }
            30% { transform: translateX(6px); }
            45% { transform: translateX(-4px); }
            60% { transform: translateX(4px); }
            75% { transform: translateX(-2px); }
            90% { transform: translateX(2px); }
        }

        .game-desc {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 10px 20px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            text-align: center;
            max-width: 90%;
            line-height: 1.5;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .game-desc strong {
            color: #ffd700;
            font-weight: 800;
        }

        .board-container {
            position: relative;
            background: var(--bg-board);
            border-radius: 20px;
            padding: 8px;
            box-shadow:
                0 16px 48px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                0 0 0 2px rgba(255, 255, 255, 0.08);
            width: var(--board-size);
            height: var(--board-size);
        }

        .board-inner {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 3px;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .cell {
            position: relative;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s ease;
            background: rgba(255, 255, 255, 0.03);
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* 气球主体 */
        .balloon {
            width: 78%;
            height: 78%;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.25s ease,
                box-shadow 0.2s ease;
            z-index: 1;
            box-shadow:
                0 6px 14px rgba(0, 0, 0, 0.4),
                inset 0 -4px 6px rgba(0, 0, 0, 0.15),
                inset 0 4px 6px rgba(255, 255, 255, 0.4);
        }

        .balloon:active {
            transform: scale(0.88);
            transition: transform 0.08s ease;
        }

        /* 气球底部小结 */
        .balloon::before {
            content: '';
            position: absolute;
            bottom: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 10px solid currentColor;
            opacity: 0.8;
            z-index: 0;
            pointer-events: none;
        }

        /* 高光 */
        .balloon::after {
            content: '';
            position: absolute;
            top: 12%;
            left: 22%;
            width: 30%;
            height: 22%;
            background: rgba(255, 255, 255, 0.55);
            border-radius: 50%;
            pointer-events: none;
            transform: rotate(-20deg);
        }

        /* 气球颜色类型 */
        .balloon-type-0 {
            background: radial-gradient(circle at 35% 30%, #FF8A80 0%, #FF6B6B 35%, #E53935 70%, #B71C1C 100%);
            color: #B71C1C; /* 小结颜色 */
        }
        .balloon-type-1 {
            background: radial-gradient(circle at 35% 30%, #FFB74D 0%, #FF9F43 35%, #E67E22 70%, #BF5F0A 100%);
            color: #BF5F0A;
        }
        .balloon-type-2 {
            background: radial-gradient(circle at 35% 30%, #FFE082 0%, #FECA57 35%, #F0B800 70%, #C79100 100%);
            color: #C79100;
        }
        .balloon-type-3 {
            background: radial-gradient(circle at 35% 30%, #69F0AE 0%, #2ED573 35%, #1DB954 70%, #0D7A30 100%);
            color: #0D7A30;
        }
        .balloon-type-4 {
            background: radial-gradient(circle at 35% 30%, #82B1FF 0%, #54A0FF 35%, #2E86DE 70%, #1A5CA8 100%);
            color: #1A5CA8;
        }
        .balloon-type-5 {
            background: radial-gradient(circle at 35% 30%, #D98FFF 0%, #C44DFF 35%, #9B30D0 70%, #6A1B9A 100%);
            color: #6A1B9A;
        }

        /* 消除动画 */
        .balloon.matched {
            animation: balloonPop 0.35s ease-out forwards;
        }

        @keyframes balloonPop {
            0% { transform: scale(1); opacity: 1; }
            40% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 上浮动画（下落改为上浮） */
        .balloon.float-up {
            animation: floatRise 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes floatRise {
            0% { transform: translateY(60px) scale(0.5); opacity: 0.3; }
            60% { transform: translateY(-4px) scale(1.05); opacity: 1; }
            80% { transform: translateY(2px) scale(0.96); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* 新气球从底部生成动画 */
        .balloon.spawn-rise {
            animation: spawnRise 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes spawnRise {
            0% { transform: translateY(80px) scale(0.2); opacity: 0; }
            50% { transform: translateY(-6px) scale(1.08); opacity: 1; }
            70% { transform: translateY(3px) scale(0.94); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* 按钮 */
        .btn {
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            color: #fff;
        }

        .btn-restart {
            background: linear-gradient(135deg, #ff6b6b 0%, #e53935 100%);
            box-shadow: 0 6px 20px rgba(229, 57, 53, 0.45);
        }
        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(229, 57, 53, 0.6);
        }
        .btn-restart:active {
            transform: translateY(0);
        }

        .float-score {
            position: absolute;
            pointer-events: none;
            font-weight: 900;
            font-size: 20px;
            color: #ffd700;
            z-index: 20;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            white-space: nowrap;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.6); opacity: 1; }
            40% { transform: translateY(-35px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-70px) scale(0.9); opacity: 0; }
        }

        @media (max-width: 500px) {
            .board-container { padding: 5px; border-radius: 14px; }
            .cell { border-radius: 7px; }
            .board-inner { gap: 2px; }
            .balloon { width: 80%; height: 80%; }
            .score-panel { padding: 10px 18px; gap: 16px; border-radius: 14px; }
            .score-value { font-size: 26px; }
            .game-title { font-size: 26px; }
            .btn { padding: 10px 22px; font-size: 14px; }
            .float-score { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <h1 class="game-title">🎈 气球爆破消消乐</h1>

        <div class="score-panel">
            <div class="score-item">
                <span class="score-label">🏆 得分</span>
                <span class="score-value" id="scoreDisplay">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">🔥 连击</span>
                <span class="combo-display" id="comboDisplay"></span>
            </div>
            <div class="score-item">
                <span class="score-label">⭐ 最高分</span>
                <span class="score-value" id="bestScoreDisplay" style="font-size:22px;color:#ffd700;">0</span>
            </div>
        </div>

        <!-- 玩法说明 -->
        <div class="game-desc">
            💡 <strong>玩法说明：</strong>直接<strong>点击</strong>任意气球即可消除，无需交换！消除后气球会从底部<strong>向上飘浮</strong>填充空位，并触发连锁反应。
        </div>

        <div class="board-container" id="boardContainer">
            <div class="board-inner" id="boardInner"></div>
        </div>

        <div class="btn-row" style="display: flex; gap: 8px; justify-content: center;">
            <button class="btn btn-restart" id="btnRestart">🔄 重新开始</button>
        </div>
    </div>

    <script>
        (function() {
            // 常量
            const ROWS = 8;
            const COLS = 8;
            const NUM_TYPES = 6;
            const MATCH_ANIM_MS = 350;
            const FLOAT_ANIM_MS = 450;   // 上浮动画时长
            const SPAWN_ANIM_MS = 500;    // 新气球动画时长

            // DOM
            const boardInner = document.getElementById('boardInner');
            const boardContainer = document.getElementById('boardContainer');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const comboDisplay = document.getElementById('comboDisplay');
            const bestScoreDisplay = document.getElementById('bestScoreDisplay');
            const btnRestart = document.getElementById('btnRestart');

            // 状态
            let board = [];
            let cellElements = [];
            let score = 0;
            let bestScore = 0;
            let comboCount = 0;
            let isAnimating = false;

            // 初始化
            function init() {
                try {
                    const saved = localStorage.getItem('balloonCrushBestScore');
                    if (saved) bestScore = parseInt(saved, 10) || 0;
                } catch (e) {}
                bestScoreDisplay.textContent = bestScore;

                score = 0;
                comboCount = 0;
                isAnimating = false;
                updateScoreDisplay();
                updateComboDisplay();
                generateBoard();
                renderBoard();
            }

            function generateBoard() {
                board = [];
                for (let r = 0; r < ROWS; r++) {
                    board[r] = [];
                    for (let c = 0; c < COLS; c++) {
                        board[r][c] = getRandomType(r, c);
                    }
                }
            }

            function getRandomType(r, c) {
                const forbidden = new Set();
                if (c >= 2 && board[r][c - 1] === board[r][c - 2]) {
                    forbidden.add(board[r][c - 1]);
                }
                if (r >= 2 && board[r - 1][c] === board[r - 2][c]) {
                    forbidden.add(board[r - 1][c]);
                }
                const allowed = [];
                for (let t = 0; t < NUM_TYPES; t++) {
                    if (!forbidden.has(t)) allowed.push(t);
                }
                if (allowed.length === 0) return Math.floor(Math.random() * NUM_TYPES);
                return allowed[Math.floor(Math.random() * allowed.length)];
            }

            // 渲染
            function renderBoard() {
                boardInner.innerHTML = '';
                cellElements = [];
                for (let r = 0; r < ROWS; r++) {
                    cellElements[r] = [];
                    for (let c = 0; c < COLS; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.addEventListener('click', () => onCellClick(r, c));

                        const balloon = document.createElement('div');
                        balloon.className = 'balloon';
                        const type = board[r][c];
                        if (type >= 0 && type < NUM_TYPES) {
                            balloon.classList.add('balloon-type-' + type);
                        } else {
                            balloon.style.visibility = 'hidden';
                        }
                        cell.appendChild(balloon);
                        boardInner.appendChild(cell);
                        cellElements[r][c] = balloon;
                    }
                }
            }

            function reRenderBoard(animFlags = null) {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const balloon = cellElements[r][c];
                        if (!balloon) continue;
                        const type = board[r][c];

                        if (type < 0) {
                            balloon.style.visibility = 'hidden';
                        } else {
                            balloon.style.visibility = 'visible';
                        }

                        for (let t = 0; t < NUM_TYPES; t++) {
                            balloon.classList.remove('balloon-type-' + t);
                        }
                        balloon.classList.remove('matched', 'float-up', 'spawn-rise');

                        if (type >= 0 && type < NUM_TYPES) {
                            balloon.classList.add('balloon-type-' + type);
                        }

                        const key = r + ',' + c;
                        if (animFlags && animFlags.has(key)) {
                            const flag = animFlags.get(key);
                            if (flag) balloon.classList.add(flag);
                        }
                    }
                }
            }

            // 匹配检测
            function findMatches() {
                const matched = new Set();
                for (let r = 0; r < ROWS; r++) {
                    let c = 0;
                    while (c < COLS) {
                        const type = board[r][c];
                        if (type < 0) { c++; continue; }
                        let end = c;
                        while (end + 1 < COLS && board[r][end + 1] === type) end++;
                        if (end - c + 1 >= 3) {
                            for (let i = c; i <= end; i++) matched.add(r + ',' + i);
                        }
                        c = end + 1;
                    }
                }
                for (let c = 0; c < COLS; c++) {
                    let r = 0;
                    while (r < ROWS) {
                        const type = board[r][c];
                        if (type < 0) { r++; continue; }
                        let end = r;
                        while (end + 1 < ROWS && board[end + 1][c] === type) end++;
                        if (end - r + 1 >= 3) {
                            for (let i = r; i <= end; i++) matched.add(i + ',' + c);
                        }
                        r = end + 1;
                    }
                }
                return matched;
            }

            // 点击处理：直接爆破
            function onCellClick(r, c) {
                if (isAnimating) return;
                if (board[r][c] < 0) return;
                clickDestroy(r, c);
            }

            async function clickDestroy(r, c) {
                if (isAnimating) return;
                isAnimating = true;
                comboCount = 0;

                const matches = new Set([r + ',' + c]);
                await processMatchLoop(matches);

                isAnimating = false;
                updateComboDisplay();

                if (score > bestScore) {
                    bestScore = score;
                    bestScoreDisplay.textContent = bestScore;
                    try {
                        localStorage.setItem('balloonCrushBestScore', bestScore);
                    } catch (e) {}
                }
            }

            async function processMatchLoop(initialMatches) {
                let matches = initialMatches;
                comboCount = 0;

                while (matches.size > 0) {
                    comboCount++;
                    const matchCount = matches.size;
                    const basePoints = calculateBasePoints(matchCount);
                    const comboMultiplier = 1 + (comboCount - 1) * 0.5;
                    const earnedPoints = Math.round(basePoints * comboMultiplier);
                    score += earnedPoints;

                    updateScoreDisplay();
                    updateComboDisplay();
                    if (comboCount >= 2) {
                        comboDisplay.classList.remove('active');
                        void comboDisplay.offsetWidth;
                        comboDisplay.classList.add('active');
                    }

                    spawnFloatScores(matches, earnedPoints);

                    // 消除动画
                    markMatched(matches);
                    await sleep(MATCH_ANIM_MS);

                    // 立即隐藏
                    for (const key of matches) {
                        const [mr, mc] = key.split(',').map(Number);
                        if (cellElements[mr] && cellElements[mr][mc]) {
                            cellElements[mr][mc].style.visibility = 'hidden';
                            cellElements[mr][mc].classList.remove('matched');
                        }
                    }

                    removeMatches(matches);

                    // 从下向上填充（气球上升）
                    const movedCells = applyRiseGravity();
                    const spawnedCells = fillEmptyBottom();

                    const animFlags = new Map();
                    for (const key of movedCells) animFlags.set(key, 'float-up');
                    for (const key of spawnedCells) animFlags.set(key, 'spawn-rise');

                    reRenderBoard(animFlags);
                    await sleep(Math.max(FLOAT_ANIM_MS, SPAWN_ANIM_MS));

                    matches = findMatches();
                }
            }

            function calculateBasePoints(matchCount) {
                if (matchCount <= 3) return matchCount * 10;
                if (matchCount === 4) return matchCount * 20;
                if (matchCount === 5) return matchCount * 30;
                return matchCount * 40;
            }

            function markMatched(matches) {
                for (const key of matches) {
                    const [r, c] = key.split(',').map(Number);
                    if (cellElements[r] && cellElements[r][c]) {
                        cellElements[r][c].classList.add('matched');
                    }
                }
            }

            function removeMatches(matches) {
                for (const key of matches) {
                    const [r, c] = key.split(',').map(Number);
                    board[r][c] = -1;
                }
            }

            // 重力改为从下向上：气球上浮
            function applyRiseGravity() {
                const movedCells = new Set();
                for (let c = 0; c < COLS; c++) {
                    let writeRow = 0; // 从顶部开始写
                    for (let r = 0; r < ROWS; r++) {
                        if (board[r][c] >= 0) {
                            if (writeRow !== r) {
                                board[writeRow][c] = board[r][c];
                                board[r][c] = -1;
                                movedCells.add(writeRow + ',' + c);
                            }
                            writeRow++;
                        }
                    }
                    // 标记所有非空位置用于动画
                    for (let r = 0; r < writeRow; r++) {
                        if (board[r][c] >= 0) movedCells.add(r + ',' + c);
                    }
                }
                return movedCells;
            }

            // 填充底部空位
            function fillEmptyBottom() {
                const spawnedCells = new Set();
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS; r++) {
                        if (board[r][c] < 0) {
                            board[r][c] = Math.floor(Math.random() * NUM_TYPES);
                            spawnedCells.add(r + ',' + c);
                        }
                    }
                }
                return spawnedCells;
            }

            function spawnFloatScores(matches, totalPoints) {
                let sumR = 0, sumC = 0;
                const matchArr = Array.from(matches);
                for (const key of matchArr) {
                    const [r, c] = key.split(',').map(Number);
                    sumR += r;
                    sumC += c;
                }
                const avgR = sumR / matchArr.length;
                const avgC = sumC / matchArr.length;

                const boardRect = boardContainer.getBoundingClientRect();
                const cellSize = boardRect.width / COLS;
                const centerX = boardRect.left + avgC * cellSize + cellSize / 2;
                const centerY = boardRect.top + avgR * cellSize + cellSize / 2;

                const floatEl = document.createElement('div');
                floatEl.className = 'float-score';
                floatEl.textContent = '+' + totalPoints;
                floatEl.style.left = centerX + 'px';
                floatEl.style.top = centerY + 'px';
                floatEl.style.position = 'fixed';
                document.body.appendChild(floatEl);

                floatEl.addEventListener('animationend', () => floatEl.remove());
                setTimeout(() => { if (floatEl.parentNode) floatEl.remove(); }, 1100);
            }

            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            function updateScoreDisplay() {
                scoreDisplay.textContent = score;
                scoreDisplay.classList.remove('pop');
                void scoreDisplay.offsetWidth;
                scoreDisplay.classList.add('pop');
            }

            function updateComboDisplay() {
                if (comboCount >= 2) {
                    comboDisplay.textContent = 'x' + comboCount + ' 🔥';
                } else {
                    comboDisplay.textContent = '';
                }
            }

            // 事件
            btnRestart.addEventListener('click', () => {
                if (isAnimating) return;
                init();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'r' || e.key === 'R') {
                    if (!isAnimating) init();
                    e.preventDefault();
                }
            });

            // 启动
            init();
            console.log('🎈 气球爆破消消乐已就绪！点击气球即可消除，气球会从底部向上飘浮。');
        })();
    </script>
</body>
</html>
