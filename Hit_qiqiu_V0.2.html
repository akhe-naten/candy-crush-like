<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎈 气球爆破消消乐 · 旋转版</title>
    <style>
        :root {
            --board-size: min(85vw, 500px);
            --bg-board: #0f0f1a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #1a1a2e 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 85% 60%, rgba(255,255,255,0.3), transparent);
            animation: twinkle 4s ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .game-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px;
        }
        .game-title {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 900;
            background: linear-gradient(180deg, #ffd700 0%, #ffaa00 40%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 3px 6px rgba(255,170,0,0.5));
            text-align: center;
        }
        .score-panel {
            display: flex;
            align-items: center;
            gap: 24px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px 28px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            justify-content: center;
        }
        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .score-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
        }
        .score-value {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            min-width: 60px;
            text-align: center;
        }
        .score-value.pop {
            animation: scorePop 0.4s ease-out;
        }
        @keyframes scorePop {
            0% { transform: scale(1); }
            30% { transform: scale(1.35); color: #ffd700; }
            100% { transform: scale(1); }
        }
        .combo-display {
            font-size: 14px;
            font-weight: 700;
            color: #ff6b6b;
            min-height: 20px;
        }
        .combo-display.active {
            animation: comboShake 0.5s ease-out;
            color: #ff4444;
        }
        @keyframes comboShake {
            0%,100%{transform:translateX(0)}
            15%{transform:translateX(-6px)}
            30%{transform:translateX(6px)}
            45%{transform:translateX(-4px)}
            60%{transform:translateX(4px)}
            75%{transform:translateX(-2px)}
            90%{transform:translateX(2px)}
        }
        .game-desc {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 10px 20px;
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            text-align: center;
            max-width: 90%;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .game-desc strong { color: #ffd700; }
        .board-container {
            position: relative;
            background: var(--bg-board);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            width: var(--board-size);
            height: var(--board-size);
            overflow: hidden;
            transition: opacity 0.2s;
        }
        .board-inner {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 3px;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .cell {
            position: relative;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            transition: background-color 0.15s;
        }
        .cell:hover { background: rgba(255,255,255,0.08); }
        .balloon {
            width: 78%;
            height: 78%;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4), inset 0 -4px 6px rgba(0,0,0,0.15), inset 0 4px 6px rgba(255,255,255,0.4);
            transition: transform 0.15s;
        }
        .balloon:active { transform: scale(0.85); }
        .balloon::before {
            content: '';
            position: absolute;
            bottom: -10%;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 10px solid currentColor;
            opacity: 0.9;
            pointer-events: none;
        }
        .balloon::after {
            content: '';
            position: absolute;
            top: 12%;
            left: 22%;
            width: 30%;
            height: 22%;
            background: rgba(255,255,255,0.55);
            border-radius: 50%;
            pointer-events: none;
            transform: rotate(-20deg);
        }
        .balloon-type-0 {
            background: radial-gradient(circle at 35% 30%, #FF8A80 0%, #FF6B6B 35%, #E53935 70%, #B71C1C 100%);
            color: #B71C1C;
        }
        .balloon-type-1 {
            background: radial-gradient(circle at 35% 30%, #FFB74D 0%, #FF9F43 35%, #E67E22 70%, #BF5F0A 100%);
            color: #BF5F0A;
        }
        .balloon-type-2 {
            background: radial-gradient(circle at 35% 30%, #FFE082 0%, #FECA57 35%, #F0B800 70%, #C79100 100%);
            color: #C79100;
        }
        .balloon-type-3 {
            background: radial-gradient(circle at 35% 30%, #69F0AE 0%, #2ED573 35%, #1DB954 70%, #0D7A30 100%);
            color: #0D7A30;
        }
        .balloon-type-4 {
            background: radial-gradient(circle at 35% 30%, #82B1FF 0%, #54A0FF 35%, #2E86DE 70%, #1A5CA8 100%);
            color: #1A5CA8;
        }
        .balloon-type-5 {
            background: radial-gradient(circle at 35% 30%, #D98FFF 0%, #C44DFF 35%, #9B30D0 70%, #6A1B9A 100%);
            color: #6A1B9A;
        }
        .balloon.matched {
            animation: balloonPop 0.3s ease-out forwards;
        }
        @keyframes balloonPop {
            0% { transform: scale(1); opacity: 1; }
            40% { transform: scale(1.4); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
        .balloon.float-up {
            animation: floatRise 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes floatRise {
            0% { transform: translateY(65px) translateX(-8px) rotate(-3deg); opacity: 0.5; }
            60% { transform: translateY(3px) translateX(2px) rotate(1deg); opacity: 1; }
            100% { transform: translateY(0) translateX(0) rotate(0); opacity: 1; }
        }
        .balloon.spawn-rise {
            animation: spawnRise 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes spawnRise {
            0% { transform: translateY(90px) scale(0.3) rotate(-5deg); opacity: 0; }
            50% { transform: translateY(-10px) scale(1.1) rotate(3deg); opacity: 1; }
            100% { transform: translateY(0) scale(1) rotate(0); opacity: 1; }
        }
        .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: #fff;
            transition: all 0.3s;
        }
        .btn-restart {
            background: linear-gradient(135deg, #ff6b6b 0%, #e53935 100%);
            box-shadow: 0 6px 20px rgba(229,57,53,0.45);
        }
        .btn-rotate {
            background: linear-gradient(135deg, #54a0ff 0%, #2e86de 100%);
            box-shadow: 0 6px 20px rgba(46,134,222,0.45);
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .float-score {
            position: absolute;
            pointer-events: none;
            font-weight: 900;
            font-size: 20px;
            color: #ffd700;
            z-index: 20;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
            white-space: nowrap;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.6); opacity: 1; }
            40% { transform: translateY(-35px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-70px) scale(0.9); opacity: 0; }
        }
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 30;
            animation: particleBurst 0.7s ease-out forwards;
        }
        @keyframes particleBurst {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }
        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <h1 class="game-title">🎈 气球爆破消消乐</h1>
    <div class="score-panel">
        <div class="score-item">
            <span class="score-label">🏆 得分</span>
            <span class="score-value" id="scoreDisplay">0</span>
        </div>
        <div class="score-item">
            <span class="score-label">🔥 连击</span>
            <span class="combo-display" id="comboDisplay"></span>
        </div>
        <div class="score-item">
            <span class="score-label">⭐ 最高分</span>
            <span class="score-value" id="bestScoreDisplay" style="font-size:22px;color:#ffd700;">0</span>
        </div>
    </div>
    <div class="game-desc">
        💡 点击气球直接爆破 · 🔄 旋转按钮重新排列所有气球
    </div>
    <div class="board-container" id="boardContainer">
        <div class="board-inner" id="boardInner"></div>
    </div>
    <div class="btn-row">
        <button class="btn btn-restart" id="btnRestart">🔄 重新开始</button>
        <button class="btn btn-rotate" id="btnRotateCW">↻ 顺时针旋转</button>
        <button class="btn btn-rotate" id="btnRotateCCW">↺ 逆时针旋转</button>
    </div>
</div>

<script>
    (function() {
        const ROWS = 8, COLS = 8, NUM_TYPES = 6;
        const boardInner = document.getElementById('boardInner');
        const boardContainer = document.getElementById('boardContainer');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const bestScoreDisplay = document.getElementById('bestScoreDisplay');

        let board = [], cellElements = [];
        let score = 0, bestScore = 0, comboCount = 0;
        let isAnimating = false;

        function init() {
            try {
                const saved = localStorage.getItem('balloonCrushBestScore');
                if (saved) bestScore = parseInt(saved, 10) || 0;
            } catch (e) {}
            bestScoreDisplay.textContent = bestScore;
            score = 0; comboCount = 0; isAnimating = false;
            updateScoreDisplay(); updateComboDisplay();
            generateBoard(); renderBoard();
        }

        function generateBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = getRandomType(r, c);
                }
            }
        }

        function getRandomType(r, c) {
            const forbidden = new Set();
            if (c >= 2 && board[r][c-1] === board[r][c-2]) forbidden.add(board[r][c-1]);
            if (r >= 2 && board[r-1][c] === board[r-2][c]) forbidden.add(board[r-1][c]);
            const allowed = [];
            for (let t = 0; t < NUM_TYPES; t++) if (!forbidden.has(t)) allowed.push(t);
            if (allowed.length === 0) return Math.floor(Math.random() * NUM_TYPES);
            return allowed[Math.floor(Math.random() * allowed.length)];
        }

        function renderBoard() {
            boardInner.innerHTML = '';
            cellElements = [];
            for (let r = 0; r < ROWS; r++) {
                cellElements[r] = [];
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.addEventListener('click', () => onCellClick(r, c));
                    const balloon = document.createElement('div');
                    balloon.className = 'balloon';
                    const type = board[r][c];
                    if (type >= 0) balloon.classList.add('balloon-type-' + type);
                    else balloon.style.visibility = 'hidden';
                    cell.appendChild(balloon);
                    boardInner.appendChild(cell);
                    cellElements[r][c] = balloon;
                }
            }
        }

        function reRenderBoard(animFlags = null) {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const balloon = cellElements[r][c];
                    if (!balloon) continue;
                    const type = board[r][c];
                    balloon.style.visibility = type < 0 ? 'hidden' : 'visible';
                    for (let t = 0; t < NUM_TYPES; t++) balloon.classList.remove('balloon-type-' + t);
                    balloon.classList.remove('matched', 'float-up', 'spawn-rise');
                    if (type >= 0) balloon.classList.add('balloon-type-' + type);
                    if (animFlags) {
                        const key = r + ',' + c;
                        if (animFlags.has(key)) balloon.classList.add(animFlags.get(key));
                    }
                }
            }
        }

        function findMatches() {
            const matched = new Set();
            for (let r = 0; r < ROWS; r++) {
                let c = 0;
                while (c < COLS) {
                    const type = board[r][c];
                    if (type < 0) { c++; continue; }
                    let end = c;
                    while (end + 1 < COLS && board[r][end+1] === type) end++;
                    if (end - c + 1 >= 3) for (let i = c; i <= end; i++) matched.add(r + ',' + i);
                    c = end + 1;
                }
            }
            for (let c = 0; c < COLS; c++) {
                let r = 0;
                while (r < ROWS) {
                    const type = board[r][c];
                    if (type < 0) { r++; continue; }
                    let end = r;
                    while (end + 1 < ROWS && board[end+1][c] === type) end++;
                    if (end - r + 1 >= 3) for (let i = r; i <= end; i++) matched.add(i + ',' + c);
                    r = end + 1;
                }
            }
            return matched;
        }

        function onCellClick(r, c) {
            if (isAnimating || board[r][c] < 0) return;
            clickDestroy(r, c);
        }

        async function clickDestroy(r, c) {
            if (isAnimating) return;
            isAnimating = true; comboCount = 0;
            createExplosion(r, c);
            const matches = new Set([r + ',' + c]);
            await processMatchLoop(matches);
            isAnimating = false; updateComboDisplay();
            if (score > bestScore) {
                bestScore = score;
                bestScoreDisplay.textContent = bestScore;
                try { localStorage.setItem('balloonCrushBestScore', bestScore); } catch (e) {}
            }
        }

        async function processMatchLoop(initialMatches) {
            let matches = initialMatches;
            comboCount = 0;
            while (matches.size > 0) {
                comboCount++;
                const earnedPoints = Math.round(calculateBasePoints(matches.size) * (1 + (comboCount-1)*0.5));
                score += earnedPoints;
                updateScoreDisplay(); updateComboDisplay();
                if (comboCount >= 2) {
                    comboDisplay.classList.remove('active');
                    void comboDisplay.offsetWidth;
                    comboDisplay.classList.add('active');
                }
                spawnFloatScores(matches, earnedPoints);
                markMatched(matches);
                await sleep(300);
                for (const key of matches) {
                    const [mr, mc] = key.split(',').map(Number);
                    if (cellElements[mr] && cellElements[mr][mc]) {
                        cellElements[mr][mc].style.visibility = 'hidden';
                        cellElements[mr][mc].classList.remove('matched');
                    }
                }
                removeMatches(matches);
                const moved = applyRiseGravity();
                const spawned = fillEmptyBottom();
                const flags = new Map();
                for (const k of moved) flags.set(k, 'float-up');
                for (const k of spawned) flags.set(k, 'spawn-rise');
                reRenderBoard(flags);
                await sleep(550);
                matches = findMatches();
            }
        }

        function calculateBasePoints(count) {
            if (count <= 3) return count * 10;
            if (count === 4) return count * 20;
            if (count === 5) return count * 30;
            return count * 40;
        }

        function markMatched(matches) {
            for (const key of matches) {
                const [r, c] = key.split(',').map(Number);
                if (cellElements[r] && cellElements[r][c]) cellElements[r][c].classList.add('matched');
            }
        }

        function removeMatches(matches) {
            for (const key of matches) {
                const [r, c] = key.split(',').map(Number);
                board[r][c] = -1;
            }
        }

        function applyRiseGravity() {
            const moved = new Set();
            for (let c = 0; c < COLS; c++) {
                let writeRow = 0;
                for (let r = 0; r < ROWS; r++) {
                    if (board[r][c] >= 0) {
                        if (writeRow !== r) {
                            board[writeRow][c] = board[r][c];
                            board[r][c] = -1;
                            moved.add(writeRow + ',' + c);
                        }
                        writeRow++;
                    }
                }
                for (let r = 0; r < writeRow; r++) moved.add(r + ',' + c);
            }
            return moved;
        }

        function fillEmptyBottom() {
            const spawned = new Set();
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS; r++) {
                    if (board[r][c] < 0) {
                        board[r][c] = Math.floor(Math.random() * NUM_TYPES);
                        spawned.add(r + ',' + c);
                    }
                }
            }
            return spawned;
        }

        // ★ 修复后的旋转：数据旋转 + 完全重绘棋盘
        function rotateBoardData(clockwise) {
            const newBoard = Array.from({ length: ROWS }, () => Array(COLS).fill(-1));
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (clockwise) {
                        newBoard[c][ROWS - 1 - r] = board[r][c];
                    } else {
                        newBoard[ROWS - 1 - c][r] = board[r][c];
                    }
                }
            }
            board = newBoard;
        }

        async function rotateAndProcess(clockwise) {
            if (isAnimating) return;
            isAnimating = true;

            // 视觉反馈：棋盘快速淡出再淡入
            boardContainer.style.opacity = '0.3';
            await sleep(150);

            rotateBoardData(clockwise);
            renderBoard(); // 完全重建棋盘

            boardContainer.style.opacity = '1';
            await sleep(150);

            // 自动消除旋转后出现的新三连
            const matches = findMatches();
            if (matches.size > 0) {
                comboCount = 0;
                await processMatchLoop(matches);
            }

            isAnimating = false;
            updateComboDisplay();
        }

        // 爆炸粒子
        function createExplosion(row, col) {
            const boardRect = boardContainer.getBoundingClientRect();
            const cellSize = boardRect.width / COLS;
            const cx = boardRect.left + col * cellSize + cellSize/2;
            const cy = boardRect.top + row * cellSize + cellSize/2;
            const colors = ['#FF6B6B','#FF9F43','#FECA57','#2ED573','#54A0FF','#C44DFF','#fff'];
            for (let i = 0; i < 16; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const angle = (i / 16) * Math.PI * 2;
                const dist = 25 + Math.random() * 20;
                p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                p.style.left = cx + 'px';
                p.style.top = cy + 'px';
                p.style.position = 'fixed';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.width = p.style.height = (8 + Math.random() * 10) + 'px';
                p.style.animationDuration = (0.5 + Math.random() * 0.4) + 's';
                document.body.appendChild(p);
                p.addEventListener('animationend', () => p.remove());
            }
        }

        function spawnFloatScores(matches, points) {
            let sumR = 0, sumC = 0;
            const arr = Array.from(matches);
            for (const key of arr) {
                const [r, c] = key.split(',').map(Number);
                sumR += r; sumC += c;
            }
            const boardRect = boardContainer.getBoundingClientRect();
            const cellSize = boardRect.width / COLS;
            const cx = boardRect.left + (sumC/arr.length) * cellSize + cellSize/2;
            const cy = boardRect.top + (sumR/arr.length) * cellSize + cellSize/2;
            const el = document.createElement('div');
            el.className = 'float-score';
            el.textContent = '+' + points;
            el.style.left = cx + 'px'; el.style.top = cy + 'px'; el.style.position = 'fixed';
            document.body.appendChild(el);
            el.addEventListener('animationend', () => el.remove());
            setTimeout(() => { if (el.parentNode) el.remove(); }, 1100);
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function updateScoreDisplay() {
            scoreDisplay.textContent = score;
            scoreDisplay.classList.remove('pop');
            void scoreDisplay.offsetWidth;
            scoreDisplay.classList.add('pop');
        }

        function updateComboDisplay() {
            comboDisplay.textContent = comboCount >= 2 ? 'x' + comboCount + ' 🔥' : '';
        }

        // 事件绑定
        document.getElementById('btnRestart').addEventListener('click', () => {
            if (isAnimating) return;
            boardContainer.style.opacity = '1';
            init();
        });
        document.getElementById('btnRotateCW').addEventListener('click', () => rotateAndProcess(true));
        document.getElementById('btnRotateCCW').addEventListener('click', () => rotateAndProcess(false));

        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                if (!isAnimating) {
                    boardContainer.style.opacity = '1';
                    init();
                }
                e.preventDefault();
            }
        });

        init();
    })();
</script>
</body>
</html>
