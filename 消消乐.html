<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🍬 糖果消消乐 - Match 3</title>
    <style>
        :root {
            --candy-red: #FF6B6B;
            --candy-red-dark: #E53935;
            --candy-red-light: #FF8A80;
            --candy-orange: #FF9F43;
            --candy-orange-dark: #E67E22;
            --candy-orange-light: #FFB74D;
            --candy-yellow: #FECA57;
            --candy-yellow-dark: #F0B800;
            --candy-yellow-light: #FFE082;
            --candy-green: #2ED573;
            --candy-green-dark: #1DB954;
            --candy-green-light: #69F0AE;
            --candy-blue: #54A0FF;
            --candy-blue-dark: #2E86DE;
            --candy-blue-light: #82B1FF;
            --candy-purple: #C44DFF;
            --candy-purple-dark: #9B30D0;
            --candy-purple-light: #D98FFF;
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-board: #0f0f1a;
            --text-primary: #f0e6d3;
            --text-accent: #ffd700;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --board-size: min(85vw, 500px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #1a1a2e 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        /* 背景星星粒子 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(2px 2px at 10% 20%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(2px 2px at 25% 55%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1px 1px at 40% 15%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(2px 2px at 55% 70%, rgba(255, 255, 255, 0.35), transparent),
                radial-gradient(1px 1px at 70% 30%, rgba(255, 255, 255, 0.45), transparent),
                radial-gradient(2px 2px at 85% 60%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1px 1px at 15% 80%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(2px 2px at 60% 10%, rgba(255, 255, 255, 0.35), transparent),
                radial-gradient(1px 1px at 90% 45%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(2px 2px at 35% 90%, rgba(255, 255, 255, 0.4), transparent);
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.6;
            }
            100% {
                opacity: 1;
            }
        }

        .game-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px;
        }

        /* 标题 */
        .game-title {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(180deg, #ffd700 0%, #ffaa00 40%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 3px 6px rgba(255, 170, 0, 0.5));
            animation: titleGlow 2s ease-in-out infinite alternate;
            text-align: center;
        }

        @keyframes titleGlow {
            0% {
                filter: drop-shadow(0 3px 6px rgba(255, 170, 0, 0.4));
            }
            100% {
                filter: drop-shadow(0 3px 14px rgba(255, 200, 0, 0.8));
            }
        }

        /* 分数面板 */
        .score-panel {
            display: flex;
            align-items: center;
            gap: 24px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            flex-wrap: wrap;
            justify-content: center;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .score-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
        }

        .score-value {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transition: transform 0.2s ease;
            min-width: 60px;
            text-align: center;
        }

        .score-value.pop {
            animation: scorePop 0.4s ease-out;
        }

        @keyframes scorePop {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.35);
                color: #ffd700;
            }
            100% {
                transform: scale(1);
            }
        }

        .combo-display {
            font-size: 14px;
            font-weight: 700;
            color: #ff6b6b;
            min-height: 20px;
            text-align: center;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .combo-display.active {
            animation: comboShake 0.5s ease-out;
            color: #ff4444;
        }

        @keyframes comboShake {
            0%,
            100% {
                transform: translateX(0);
            }
            15% {
                transform: translateX(-6px);
            }
            30% {
                transform: translateX(6px);
            }
            45% {
                transform: translateX(-4px);
            }
            60% {
                transform: translateX(4px);
            }
            75% {
                transform: translateX(-2px);
            }
            90% {
                transform: translateX(2px);
            }
        }

        /* 游戏棋盘容器 */
        .board-container {
            position: relative;
            background: var(--bg-board);
            border-radius: 20px;
            padding: 8px;
            box-shadow:
                0 16px 48px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                0 0 0 2px rgba(255, 255, 255, 0.08);
            width: var(--board-size);
            height: var(--board-size);
        }

        .board-inner {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 3px;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 每个格子 */
        .cell {
            position: relative;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s ease;
            background: rgba(255, 255, 255, 0.03);
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* 糖果元素 */
        .candy {
            width: 78%;
            height: 78%;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.25s ease,
                box-shadow 0.2s ease;
            z-index: 1;
            box-shadow:
                0 4px 10px rgba(0, 0, 0, 0.35),
                inset 0 -3px 6px rgba(0, 0, 0, 0.25),
                inset 0 3px 6px rgba(255, 255, 255, 0.3);
        }

        .candy:active {
            transform: scale(0.88);
            transition: transform 0.08s ease;
        }

        /* 糖果颜色类型 */
        .candy-type-0 {
            background: radial-gradient(circle at 35% 30%, #FF8A80 0%, #FF6B6B 35%, #E53935 70%, #B71C1C 100%);
            box-shadow: 0 4px 10px rgba(229, 57, 53, 0.5),
                inset 0 -3px 6px rgba(0, 0, 0, 0.3),
                inset 0 3px 6px rgba(255, 255, 255, 0.35);
        }
        .candy-type-1 {
            background: radial-gradient(circle at 35% 30%, #FFB74D 0%, #FF9F43 35%, #E67E22 70%, #BF5F0A 100%);
            box-shadow: 0 4px 10px rgba(230, 126, 34, 0.5),
                inset 0 -3px 6px rgba(0, 0, 0, 0.3),
                inset 0 3px 6px rgba(255, 255, 255, 0.35);
        }
        .candy-type-2 {
            background: radial-gradient(circle at 35% 30%, #FFE082 0%, #FECA57 35%, #F0B800 70%, #C79100 100%);
            box-shadow: 0 4px 10px rgba(240, 184, 0, 0.5),
                inset 0 -3px 6px rgba(0, 0, 0, 0.3),
                inset 0 3px 6px rgba(255, 255, 255, 0.35);
        }
        .candy-type-3 {
            background: radial-gradient(circle at 35% 30%, #69F0AE 0%, #2ED573 35%, #1DB954 70%, #0D7A30 100%);
            box-shadow: 0 4px 10px rgba(29, 185, 84, 0.5),
                inset 0 -3px 6px rgba(0, 0, 0, 0.3),
                inset 0 3px 6px rgba(255, 255, 255, 0.35);
        }
        .candy-type-4 {
            background: radial-gradient(circle at 35% 30%, #82B1FF 0%, #54A0FF 35%, #2E86DE 70%, #1A5CA8 100%);
            box-shadow: 0 4px 10px rgba(46, 134, 222, 0.5),
                inset 0 -3px 6px rgba(0, 0, 0, 0.3),
                inset 0 3px 6px rgba(255, 255, 255, 0.35);
        }
        .candy-type-5 {
            background: radial-gradient(circle at 35% 30%, #D98FFF 0%, #C44DFF 35%, #9B30D0 70%, #6A1B9A 100%);
            box-shadow: 0 4px 10px rgba(155, 48, 208, 0.5),
                inset 0 -3px 6px rgba(0, 0, 0, 0.3),
                inset 0 3px 6px rgba(255, 255, 255, 0.35);
        }

        /* 高光效果 */
        .candy::after {
            content: '';
            position: absolute;
            top: 12%;
            left: 22%;
            width: 30%;
            height: 22%;
            background: rgba(255, 255, 255, 0.55);
            border-radius: 50%;
            pointer-events: none;
            transform: rotate(-20deg);
        }

        /* 选中状态 */
        .candy.selected {
            animation: selectedPulse 0.7s ease-in-out infinite;
            z-index: 5;
            box-shadow:
                0 0 0 4px rgba(255, 255, 255, 0.9),
                0 0 20px 8px rgba(255, 215, 0, 0.7),
                0 8px 24px rgba(0, 0, 0, 0.5) !important;
            transform: scale(1.08);
        }

        @keyframes selectedPulse {
            0%,
            100% {
                box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.9),
                    0 0 20px 8px rgba(255, 215, 0, 0.7),
                    0 8px 24px rgba(0, 0, 0, 0.5);
            }
            50% {
                box-shadow: 0 0 0 6px rgba(255, 255, 255, 1),
                    0 0 30px 14px rgba(255, 215, 0, 0.95),
                    0 8px 28px rgba(0, 0, 0, 0.55);
            }
        }

        /* 消除动画 */
        .candy.matched {
            animation: candyPop 0.35s ease-out forwards;
        }

        @keyframes candyPop {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            40% {
                transform: scale(1.25);
                opacity: 1;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        /* 下落动画 */
        .candy.drop-in {
            animation: dropBounce 0.4s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes dropBounce {
            0% {
                transform: translateY(-60px) scale(0.5);
                opacity: 0.3;
            }
            60% {
                transform: translateY(6px) scale(1.05);
                opacity: 1;
            }
            80% {
                transform: translateY(-3px) scale(0.96);
                opacity: 1;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* 新生成元素动画 */
        .candy.spawn-in {
            animation: spawnBounce 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes spawnBounce {
            0% {
                transform: translateY(-80px) scale(0.2);
                opacity: 0;
            }
            50% {
                transform: translateY(8px) scale(1.08);
                opacity: 1;
            }
            70% {
                transform: translateY(-4px) scale(0.94);
                opacity: 1;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* 提示闪烁 */
        .candy.hint-glow {
            animation: hintPulse 0.6s ease-in-out 3;
        }

        @keyframes hintPulse {
            0%,
            100% {
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.35),
                    inset 0 -3px 6px rgba(0, 0, 0, 0.25),
                    inset 0 3px 6px rgba(255, 255, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 18px 8px rgba(255, 255, 255, 0.85),
                    0 4px 10px rgba(0, 0, 0, 0.35),
                    inset 0 -3px 6px rgba(0, 0, 0, 0.25),
                    inset 0 3px 6px rgba(255, 255, 255, 0.3);
            }
        }

        /* 按钮 */
        .btn {
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .btn-restart {
            background: linear-gradient(135deg, #ff6b6b 0%, #e53935 100%);
            box-shadow: 0 6px 20px rgba(229, 57, 53, 0.45);
        }
        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(229, 57, 53, 0.6);
        }
        .btn-restart:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(229, 57, 53, 0.4);
        }

        .btn-hint {
            background: linear-gradient(135deg, #54a0ff 0%, #2e86de 100%);
            box-shadow: 0 6px 20px rgba(46, 134, 222, 0.45);
            margin-left: 8px;
        }
        .btn-hint:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(46, 134, 222, 0.6);
        }
        .btn-hint:active {
            transform: translateY(0);
        }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 分数飘出特效 */
        .float-score {
            position: absolute;
            pointer-events: none;
            font-weight: 900;
            font-size: 20px;
            color: #ffd700;
            z-index: 20;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            white-space: nowrap;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.6);
                opacity: 1;
            }
            40% {
                transform: translateY(-35px) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translateY(-70px) scale(0.9);
                opacity: 0;
            }
        }

        /* 响应式 */
        @media (max-width: 500px) {
            .board-container {
                padding: 5px;
                border-radius: 14px;
            }
            .cell {
                border-radius: 7px;
            }
            .board-inner {
                gap: 2px;
            }
            .candy::after {
                top: 10%;
                left: 20%;
                width: 28%;
                height: 20%;
            }
            .score-panel {
                padding: 10px 18px;
                gap: 16px;
                border-radius: 14px;
            }
            .score-value {
                font-size: 26px;
            }
            .game-title {
                font-size: 26px;
            }
            .btn {
                padding: 10px 22px;
                font-size: 14px;
            }
            .float-score {
                font-size: 16px;
            }
        }

        @media (max-width: 380px) {
            .board-container {
                padding: 3px;
                border-radius: 10px;
            }
            .board-inner {
                gap: 1.5px;
            }
            .cell {
                border-radius: 5px;
            }
            .candy {
                width: 82%;
                height: 82%;
            }
            .score-panel {
                padding: 8px 12px;
                gap: 10px;
                border-radius: 10px;
            }
            .score-value {
                font-size: 22px;
                min-width: 40px;
            }
            .score-label {
                font-size: 9px;
                letter-spacing: 1px;
            }
            .btn {
                padding: 8px 16px;
                font-size: 12px;
                letter-spacing: 0.5px;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- 标题 -->
        <h1 class="game-title">🍬 糖果消消乐</h1>

        <!-- 分数面板 -->
        <div class="score-panel">
            <div class="score-item">
                <span class="score-label">🏆 得分</span>
                <span class="score-value" id="scoreDisplay">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">🔥 连击</span>
                <span class="combo-display" id="comboDisplay"></span>
            </div>
            <div class="score-item">
                <span class="score-label">⭐ 最高分</span>
                <span class="score-value" id="bestScoreDisplay" style="font-size:22px;color:#ffd700;">0</span>
            </div>
        </div>

        <!-- 游戏棋盘 -->
        <div class="board-container" id="boardContainer">
            <div class="board-inner" id="boardInner"></div>
        </div>

        <!-- 按钮 -->
        <div class="btn-row">
            <button class="btn btn-restart" id="btnRestart" title="重新开始">🔄 重新开始</button>
            <button class="btn btn-hint" id="btnHint" title="显示提示">💡 提示</button>
        </div>
    </div>

    <script>
        (function() {
            // ============ 游戏常量 ============
            const ROWS = 8;
            const COLS = 8;
            const NUM_TYPES = 6; // 糖果种类数
            const SWAP_ANIM_MS = 250; // 交换动画时长
            const MATCH_ANIM_MS = 350; // 消除动画时长
            const DROP_ANIM_MS = 400; // 下落动画时长
            const SPAWN_ANIM_MS = 450; // 新生成动画时长
            const HINT_DELAY_MS = 5000; // 自动提示延迟

            // ============ DOM引用 ============
            const boardInner = document.getElementById('boardInner');
            const boardContainer = document.getElementById('boardContainer');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const comboDisplay = document.getElementById('comboDisplay');
            const bestScoreDisplay = document.getElementById('bestScoreDisplay');
            const btnRestart = document.getElementById('btnRestart');
            const btnHint = document.getElementById('btnHint');

            // ============ 游戏状态 ============
            let board = []; // board[row][col] = 0..5 (糖果类型) 或 -1 (空)
            let cellElements = []; // cellElements[row][col] = DOM元素(.candy)
            let score = 0;
            let bestScore = 0;
            let comboCount = 0;
            let selectedRow = -1;
            let selectedCol = -1;
            let isAnimating = false;
            let hintTimeout = null;
            let hintPair = null; // 当前提示的交换对 {r1,c1,r2,c2}

            // ============ 初始化 ============
            function init() {
                // 加载最高分
                try {
                    const saved = localStorage.getItem('candyCrushBestScore');
                    if (saved) bestScore = parseInt(saved, 10) || 0;
                } catch (e) { /* 忽略 */ }
                bestScoreDisplay.textContent = bestScore;

                score = 0;
                comboCount = 0;
                selectedRow = -1;
                selectedCol = -1;
                isAnimating = false;
                hintPair = null;
                updateScoreDisplay();
                updateComboDisplay();
                generateBoard();
                renderBoard();
                resetHintTimer();
            }

            // ============ 棋盘生成（无初始3连） ============
            function generateBoard() {
                board = [];
                for (let r = 0; r < ROWS; r++) {
                    board[r] = [];
                    for (let c = 0; c < COLS; c++) {
                        let type = getRandomType(r, c);
                        board[r][c] = type;
                    }
                }
                // 确保有可用移动
                if (!hasAvailableMove()) {
                    generateBoard(); // 重新生成
                }
            }

            function getRandomType(r, c) {
                // 收集会导致3连的类型
                const forbidden = new Set();

                // 检查左边两个
                if (c >= 2 && board[r][c - 1] === board[r][c - 2]) {
                    forbidden.add(board[r][c - 1]);
                }
                // 检查上边两个
                if (r >= 2 && board[r - 1][c] === board[r - 2][c]) {
                    forbidden.add(board[r - 1][c]);
                }

                // 从允许的类型中随机选择
                const allowed = [];
                for (let t = 0; t < NUM_TYPES; t++) {
                    if (!forbidden.has(t)) allowed.push(t);
                }

                if (allowed.length === 0) {
                    // 理论上不会发生（6种类型，最多排除2种）
                    return Math.floor(Math.random() * NUM_TYPES);
                }
                return allowed[Math.floor(Math.random() * allowed.length)];
            }

            // ============ 渲染 ============
            function renderBoard(animFlags = null) {
                // animFlags: Map("r,c" -> "drop-in" | "spawn-in" | null)
                boardInner.innerHTML = '';
                cellElements = [];

                for (let r = 0; r < ROWS; r++) {
                    cellElements[r] = [];
                    for (let c = 0; c < COLS; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        cell.addEventListener('click', () => onCellClick(r, c));

                        const candy = document.createElement('div');
                        candy.className = 'candy';
                        const type = board[r][c];
                        if (type >= 0 && type < NUM_TYPES) {
                            candy.classList.add('candy-type-' + type);
                        } else {
                            candy.style.visibility = 'hidden';
                        }

                        // 动画标记
                        const key = r + ',' + c;
                        if (animFlags && animFlags.has(key)) {
                            const flag = animFlags.get(key);
                            if (flag) {
                                candy.classList.add(flag);
                            }
                        }

                        // 选中状态
                        if (r === selectedRow && c === selectedCol) {
                            candy.classList.add('selected');
                        }

                        // 提示发光
                        if (hintPair) {
                            if ((r === hintPair.r1 && c === hintPair.c1) ||
                                (r === hintPair.r2 && c === hintPair.c2)) {
                                candy.classList.add('hint-glow');
                            }
                        }

                        cell.appendChild(candy);
                        boardInner.appendChild(cell);
                        cellElements[r][c] = candy;
                    }
                }
            }

            function reRenderBoard(animFlags = null) {
                // 更新现有DOM元素而不是重建
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const candy = cellElements[r][c];
                        if (!candy) continue;
                        const type = board[r][c];

                        // 清除所有类型类
                        for (let t = 0; t < NUM_TYPES; t++) {
                            candy.classList.remove('candy-type-' + t);
                        }
                        candy.classList.remove('selected', 'matched', 'drop-in', 'spawn-in', 'hint-glow');

                        if (type >= 0 && type < NUM_TYPES) {
                            candy.classList.add('candy-type-' + type);
                            candy.style.visibility = 'visible';
                        } else {
                            candy.style.visibility = 'hidden';
                        }

                        // 选中状态
                        if (r === selectedRow && c === selectedCol) {
                            candy.classList.add('selected');
                        }

                        // 动画标记
                        const key = r + ',' + c;
                        if (animFlags && animFlags.has(key)) {
                            const flag = animFlags.get(key);
                            if (flag) {
                                candy.classList.add(flag);
                            }
                        }

                        // 提示发光
                        if (hintPair) {
                            if ((r === hintPair.r1 && c === hintPair.c1) ||
                                (r === hintPair.r2 && c === hintPair.c2)) {
                                candy.classList.add('hint-glow');
                            }
                        }
                    }
                }
            }

            // ============ 匹配检测 ============
            function findMatches() {
                // 返回 Set: "r,c" 字符串集合
                const matched = new Set();

                // 水平检测
                for (let r = 0; r < ROWS; r++) {
                    let c = 0;
                    while (c < COLS) {
                        const type = board[r][c];
                        if (type < 0) { c++; continue; }
                        let end = c;
                        while (end + 1 < COLS && board[r][end + 1] === type) end++;
                        const len = end - c + 1;
                        if (len >= 3) {
                            for (let i = c; i <= end; i++) {
                                matched.add(r + ',' + i);
                            }
                        }
                        c = end + 1;
                    }
                }

                
                for (let c = 0; c < COLS; c++) {
                    let r = 0;
                    while (r < ROWS) {
                        const type = board[r][c];
                        if (type < 0) { r++; continue; }
                        let end = r;
                        while (end + 1 < ROWS && board[end + 1][c] === type) end++;
                        const len = end - r + 1;
                        if (len >= 3) {
                            for (let i = r; i <= end; i++) {
                                matched.add(i + ',' + c);
                            }
                        }
                        r = end + 1;
                    }
                }

                return matched;
            }

            // ============ 检查是否有可用移动 ============
            function hasAvailableMove() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        // 尝试与右边交换
                        if (c + 1 < COLS) {
                            swapBoardData(r, c, r, c + 1);
                            const m = findMatches();
                            swapBoardData(r, c, r, c + 1); // 交换回来
                            if (m.size > 0) return true;
                        }
                        // 尝试与下边交换
                        if (r + 1 < ROWS) {
                            swapBoardData(r, c, r + 1, c);
                            const m = findMatches();
                            swapBoardData(r, c, r + 1, c); // 交换回来
                            if (m.size > 0) return true;
                        }
                    }
                }
                return false;
            }

            function findHintMove() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (c + 1 < COLS) {
                            swapBoardData(r, c, r, c + 1);
                            const m = findMatches();
                            swapBoardData(r, c, r, c + 1);
                            if (m.size > 0) return { r1: r, c1: c, r2: r, c2: c + 1 };
                        }
                        if (r + 1 < ROWS) {
                            swapBoardData(r, c, r + 1, c);
                            const m = findMatches();
                            swapBoardData(r, c, r + 1, c);
                            if (m.size > 0) return { r1: r, c1: c, r2: r + 1, c2: c };
                        }
                    }
                }
                return null;
            }

            function swapBoardData(r1, c1, r2, c2) {
                const temp = board[r1][c1];
                board[r1][c1] = board[r2][c2];
                board[r2][c2] = temp;
            }

            // ============ 点击处理：直接爆破 ============
function onCellClick(r, c) {
    if (isAnimating) return;
    if (board[r][c] < 0) return;
    clickDestroy(r, c);
}

async function clickDestroy(r, c) {
    if (isAnimating) return;
    isAnimating = true;
    comboCount = 0;

    // 构造仅包含该格子的"匹配集"
    const matches = new Set([r + ',' + c]);
    await processMatchLoop(matches);

    isAnimating = false;
    updateComboDisplay();

    if (score > bestScore) {
        bestScore = score;
        bestScoreDisplay.textContent = bestScore;
        try {
            localStorage.setItem('candyCrushBestScore', bestScore);
        } catch (e) {}
    }
}

            function isAdjacent(r1, c1, r2, c2) {
                return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
            }

            // ============ 交换逻辑 ============
            async function attemptSwap(r1, c1, r2, c2) {
                if (isAnimating) return;
                isAnimating = true;
                clearHintTimer();

                // 执行交换
                swapBoardData(r1, c1, r2, c2);
                reRenderBoard();
                await sleep(SWAP_ANIM_MS);

                // 检查匹配
                const matches = findMatches();
                if (matches.size === 0) {
                    // 没有匹配，交换回来
                    swapBoardData(r1, c1, r2, c2);
                    reRenderBoard();
                    await sleep(SWAP_ANIM_MS);
                    isAnimating = false;
                    resetHintTimer();
                    return;
                }

                // 有匹配，处理消除循环
                comboCount = 0;
                await processMatchLoop(matches);

                // 检查是否有可用移动
                if (!hasAvailableMove()) {
                    await shuffleBoard();
                }

                isAnimating = false;
                updateComboDisplay();
                resetHintTimer();

                // 保存最高分
                if (score > bestScore) {
                    bestScore = score;
                    bestScoreDisplay.textContent = bestScore;
                    try {
                        localStorage.setItem('candyCrushBestScore', bestScore);
                    } catch (e) { /* 忽略 */ }
                }
            }

            async function processMatchLoop(initialMatches) {
                let matches = initialMatches;
                comboCount = 0;

                while (matches.size > 0) {
                    comboCount++;

                    // 计算得分
                    const matchCount = matches.size;
                    const basePoints = calculateBasePoints(matchCount);
                    const comboMultiplier = 1 + (comboCount - 1) * 0.5;
                    const earnedPoints = Math.round(basePoints * comboMultiplier);
                    score += earnedPoints;

                    // 更新显示
                    updateScoreDisplay();
                    updateComboDisplay();
                    if (comboCount >= 2) {
                        const cd = comboDisplay;
                        cd.classList.remove('active');
                        void cd.offsetWidth;
                        cd.classList.add('active');
                    }

                    // 飘分特效
                    spawnFloatScores(matches, earnedPoints);

                    // 标记消除动画
markMatched(matches);
await sleep(MATCH_ANIM_MS);

// 消除后立即隐藏匹配的糖果，避免闪烁
for (const key of matches) {
    const [mr, mc] = key.split(',').map(Number);
    if (cellElements[mr] && cellElements[mr][mc]) {
        cellElements[mr][mc].style.visibility = 'hidden';
        cellElements[mr][mc].classList.remove('matched');
    }
}

// 移除数据
removeMatches(matches);

                    // 下落
                    const droppedCells = applyGravity();
                    // 填充新元素
                    const spawnedCells = fillEmpty();

                    // 合并动画标记
                    const animFlags = new Map();
                    for (const key of droppedCells) {
                        animFlags.set(key, 'drop-in');
                    }
                    for (const key of spawnedCells) {
                        animFlags.set(key, 'spawn-in');
                    }

                    reRenderBoard(animFlags);
                    await sleep(Math.max(DROP_ANIM_MS, SPAWN_ANIM_MS));

                    // 检查新匹配
                    matches = findMatches();
                }
            }

            function calculateBasePoints(matchCount) {
                if (matchCount <= 3) return matchCount * 10;
                if (matchCount === 4) return matchCount * 20;
                if (matchCount === 5) return matchCount * 30;
                return matchCount * 40;
            }

            function markMatched(matches) {
                for (const key of matches) {
                    const [r, c] = key.split(',').map(Number);
                    if (cellElements[r] && cellElements[r][c]) {
                        cellElements[r][c].classList.add('matched');
                    }
                }
            }

            function removeMatches(matches) {
                for (const key of matches) {
                    const [r, c] = key.split(',').map(Number);
                    board[r][c] = -1;
                }
            }

            function applyGravity() {
                const movedCells = new Set();
                for (let c = 0; c < COLS; c++) {
                    let writeRow = ROWS - 1;
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (board[r][c] >= 0) {
                            if (writeRow !== r) {
                                board[writeRow][c] = board[r][c];
                                board[r][c] = -1;
                                movedCells.add(writeRow + ',' + c);
                            }
                            writeRow--;
                        }
                    }
                    // 标记所有非空位置（用于下落动画）
                    for (let r = writeRow + 1; r < ROWS; r++) {
                        if (board[r][c] >= 0 && !movedCells.has(r + ',' + c)) {
                            // 检查它是否原本就在这个位置（没移动过的）
                            // 简化：标记该列所有最终非空位置
                        }
                    }
                    // 重新标记：该列从顶部到writeRow都是空的，从writeRow+1到底部都是实心的
                    // 对于下落动画，标记writeRow+1到ROWS-1中那些原本不在该位置的元素
                    // 简化处理：标记所有writeRow+1到ROWS-1的格子
                    for (let r = writeRow + 1; r < ROWS; r++) {
                        if (board[r][c] >= 0) {
                            movedCells.add(r + ',' + c);
                        }
                    }
                }
                return movedCells;
            }

            function fillEmpty() {
                const spawnedCells = new Set();
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (board[r][c] < 0) {
                            board[r][c] = Math.floor(Math.random() * NUM_TYPES);
                            spawnedCells.add(r + ',' + c);
                        }
                    }
                }
                return spawnedCells;
            }

            async function shuffleBoard() {
                // 洗牌：重新生成棋盘
                comboDisplay.textContent = '🔀 洗牌中...';
                await sleep(600);
                generateBoard();
                reRenderBoard();
                await sleep(300);
                updateComboDisplay();
            }

            // ============ 飘分特效 ============
            function spawnFloatScores(matches, totalPoints) {
                // 计算匹配的中心位置
                let sumR = 0,
                    sumC = 0;
                const matchArr = Array.from(matches);
                for (const key of matchArr) {
                    const [r, c] = key.split(',').map(Number);
                    sumR += r;
                    sumC += c;
                }
                const avgR = sumR / matchArr.length;
                const avgC = sumC / matchArr.length;

                // 获取棋盘容器位置
                const boardRect = boardContainer.getBoundingClientRect();
                const cellSize = boardRect.width / COLS;
                const centerX = boardRect.left + avgC * cellSize + cellSize / 2;
                const centerY = boardRect.top + avgR * cellSize + cellSize / 2;

                // 创建飘分元素
                const floatEl = document.createElement('div');
                floatEl.className = 'float-score';
                floatEl.textContent = '+' + totalPoints;
                floatEl.style.left = centerX + 'px';
                floatEl.style.top = centerY + 'px';
                floatEl.style.position = 'fixed';
                document.body.appendChild(floatEl);

                // 动画结束后移除
                floatEl.addEventListener('animationend', () => {
                    floatEl.remove();
                });
                // 兜底移除
                setTimeout(() => {
                    if (floatEl.parentNode) floatEl.remove();
                }, 1100);
            }

            // ============ 提示系统 ============
            function resetHintTimer() {
                clearHintTimer();
                hintTimeout = setTimeout(() => {
                    if (!isAnimating && selectedRow === -1) {
                        showHint();
                    }
                }, HINT_DELAY_MS);
            }

            function clearHintTimer() {
                if (hintTimeout) {
                    clearTimeout(hintTimeout);
                    hintTimeout = null;
                }
            }

            function showHint() {
                const hint = findHintMove();
                if (hint) {
                    hintPair = hint;
                    reRenderBoard();
                    // 3秒后清除提示
                    setTimeout(() => {
                        if (hintPair === hint) {
                            hintPair = null;
                            reRenderBoard();
                        }
                    }, 3000);
                }
            }

            // ============ 手动提示按钮 ============
            function onHintClick() {
                if (isAnimating) return;
                clearHintTimer();
                hintPair = null;
                reRenderBoard();
                const hint = findHintMove();
                if (hint) {
                    hintPair = hint;
                    reRenderBoard();
                    setTimeout(() => {
                        if (hintPair === hint) {
                            hintPair = null;
                            reRenderBoard();
                        }
                    }, 2500);
                }
                resetHintTimer();
            }

            // ============ 辅助函数 ============
            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            function updateScoreDisplay() {
                const display = scoreDisplay;
                display.textContent = score;
                display.classList.remove('pop');
                void display.offsetWidth;
                display.classList.add('pop');
            }

            function updateComboDisplay() {
                if (comboCount >= 2) {
                    comboDisplay.textContent = 'x' + comboCount + ' 🔥';
                } else if (comboCount === 1) {
                    comboDisplay.textContent = '';
                } else {
                    comboDisplay.textContent = '';
                }
            }

            // ============ 事件监听 ============
            btnRestart.addEventListener('click', () => {
                if (isAnimating) return;
                clearHintTimer();
                hintPair = null;
                selectedRow = -1;
                selectedCol = -1;
                init();
            });

            btnHint.addEventListener('click', onHintClick);

            // ============ 键盘操作（桌面端） ============
            document.addEventListener('keydown', (e) => {
                if (isAnimating) return;
                if (e.key === 'h' || e.key === 'H') {
                    onHintClick();
                    return;
                }
                if (e.key === 'r' || e.key === 'R') {
                    if (!isAnimating) {
                        clearHintTimer();
                        hintPair = null;
                        selectedRow = -1;
                        selectedCol = -1;
                        init();
                    }
                    return;
                }
                if (selectedRow === -1) return;
                let newR = selectedRow;
                let newC = selectedCol;
                switch (e.key) {
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        newR = Math.max(0, selectedRow - 1);
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        newR = Math.min(ROWS - 1, selectedRow + 1);
                        break;
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        newC = Math.max(0, selectedCol - 1);
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        newC = Math.min(COLS - 1, selectedCol + 1);
                        break;
                    case 'Escape':
                        selectedRow = -1;
                        selectedCol = -1;
                        hintPair = null;
                        reRenderBoard();
                        resetHintTimer();
                        return;
                    default:
                        return;
                }
                if (newR !== selectedRow || newC !== selectedCol) {
                    if (isAdjacent(selectedRow, selectedCol, newR, newC)) {
                        const sr = selectedRow;
                        const sc = selectedCol;
                        selectedRow = -1;
                        selectedCol = -1;
                        hintPair = null;
                        attemptSwap(sr, sc, newR, newC);
                    } else {
                        selectedRow = newR;
                        selectedCol = newC;
                        hintPair = null;
                        reRenderBoard();
                        resetHintTimer();
                    }
                }
                e.preventDefault();
            });

            // ============ 启动游戏 ============
            init();

            console.log('🍬 糖果消消乐已就绪！');
            console.log('   🖱️ 点击选择糖果，再点击相邻糖果进行交换');
            console.log('   ⌨️ 键盘方向键/WASD移动选择，H显示提示，R重新开始');
            console.log('   📱 支持移动端触摸操作');
            console.log('   💡 ' + HINT_DELAY_MS / 1000 + '秒无操作自动显示提示');
        })();
    </script>
</body>
